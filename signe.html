<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Séragone</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c0404">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Cinzel:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#0c0404;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
#raw{color:rgba(218,165,32,.6);font-family:monospace;font-size:11px;margin-bottom:30px;word-break:break-all;line-height:1.5;max-width:360px;}
#pct{font-family:'Cormorant Garamond',serif;font-size:120px;font-weight:300;color:#f0c040;line-height:1;}
#pct sup{font-size:40%;vertical-align:super;}
#lecture{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;font-style:italic;color:#f0c040;margin-top:10px;letter-spacing:3px;}
#etat{font-family:'Cinzel',serif;font-size:12px;letter-spacing:5px;color:#daa520;margin-top:8px;}
#resume{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:20px;color:#e8d5b0;margin-top:16px;max-width:300px;line-height:1.6;}
#prix{font-family:'Cinzel',serif;font-size:14px;color:rgba(218,165,32,.4);margin-top:30px;letter-spacing:3px;}
#dot{width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block;margin-right:6px;vertical-align:middle;}
#dotlbl{font-family:'Cinzel',serif;font-size:8px;color:rgba(218,165,32,.4);letter-spacing:2px;vertical-align:middle;}
.topbar{margin-bottom:20px;}
</style>
</head>
<body>
<div class="topbar"><span id="dot"></span><span id="dotlbl">—</span></div>
<div id="raw">chargement…</div>
<div id="pct">—<sup>%</sup></div>
<div id="lecture">···</div>
<div id="etat">···</div>
<div id="resume"></div>
<div id="prix"></div>

<script>
const URL_DATA = 'https://vps-1e58449b.vps.ovh.net/data';

async function fetchState() {
  try {
    const r = await fetch(URL_DATA + '?t=' + Date.now());
    const txt = await r.text();
    
    // Affiche le JSON brut pour debug
    document.getElementById('raw').textContent = txt.substring(0, 200);
    
    const d = JSON.parse(txt);
    const oncle = d.oncle || {};

    const chance = parseFloat(oncle.chance_gain_pct ?? d.chance_gain_pct ?? 50).toFixed(0);
    const lecture = (oncle.lecture_oncle ?? d.lecture_oncle ?? 'NEUTRE').toUpperCase().trim();
    const resume  = oncle.resume_court ?? d.resume_court ?? '';
    const prix    = parseFloat(oncle.prix ?? d.prix ?? 0);

    const lib = {PLUIEDOR:"Pluie d'or",DÉGAGÉ:"Dégagé",DEGAGÉ:"Dégagé",NEUTRE:"Neutre",AVERTISSEMENT:"Avertissement","TEMPÊTE":"Tempête"};

    document.getElementById('pct').innerHTML     = chance + '<sup>%</sup>';
    document.getElementById('lecture').textContent = lib[lecture] || lecture;
    document.getElementById('etat').textContent  = lecture;
    document.getElementById('resume').textContent = resume;
    document.getElementById('prix').textContent  = prix > 0 ? prix.toLocaleString('fr-FR') + ' €' : '';

    document.getElementById('dot').style.background = '#22c55e';
    document.getElementById('dotlbl').textContent = 'OK';

  } catch(e) {
    document.getElementById('raw').textContent = 'ERREUR: ' + e.message;
    document.getElementById('dot').style.background = '#ef4444';
    document.getElementById('dotlbl').textContent = 'ERR';
  }
}

fetchState();
setInterval(fetchState, 30000);
</script>
</body>
</html>
