  @keyframes breathe {
    0%,100% { transform:scale(1);    filter:brightness(.85); }
    50%      { transform:scale(1.03); filter:brightness(.95); }
  }

  /* OVERLAY */
  .overlay {
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 70% 70% at 50% 50%,
        rgba(8,2,2,.35) 0%,
        rgba(8,2,2,.72) 55%,
        rgba(8,2,2,.92) 100%);
  }

  /* CONTENU */
  .content {
    position:fixed; inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:0;
    padding:40px 32px;
  }

  /* SIGNE DU JOUR */
  .signe-label {
    font-family:'Cinzel', serif;
    font-size:clamp(8px,2.2vw,11px);
    letter-spacing:6px;
    color:rgba(218,165,32,.5);
    text-transform:uppercase;
    margin-bottom:32px;
    animation:fadein 2s ease;
  }

  /* GRAND POURCENTAGE */
  .pct {
    font-family:'Cormorant Garamond', serif;
    font-size:clamp(88px,24vw,160px);
    font-weight:300;
    color:#f0c040;
    line-height:1;
    text-shadow:
      0 0 60px rgba(218,165,32,.6),
      0 0 120px rgba(218,165,32,.25),
      0 3px 12px rgba(0,0,0,1);
    animation:fadein 2.5s ease, glow 6s ease-in-out infinite 2s;
    letter-spacing:-2px;
  }
  @keyframes glow {
    0%,100% { text-shadow: 0 0 40px rgba(218,165,32,.5), 0 3px 12px rgba(0,0,0,1); }
    50%      { text-shadow: 0 0 80px rgba(218,165,32,.9), 0 0 160px rgba(218,165,32,.3), 0 3px 12px rgba(0,0,0,1); }
  }

  /* LIBELLÉ */
  .libelle {
    font-family:'Cormorant Garamond', serif;
    font-size:clamp(22px,5.5vw,34px);
    font-weight:300;
    font-style:italic;
    color:#d4b896;
    letter-spacing:3px;
    margin-top:14px;
    text-shadow:0 2px 12px rgba(0,0,0,1);
    animation:fadein 3s ease;
  }

  /* SÉPARATEUR */
  .sep {
    width:40px; height:1px;
    background:linear-gradient(to right, transparent, rgba(218,165,32,.5), transparent);
    margin:24px auto;
    animation:fadein 3.5s ease;
  }

  /* ÉTAT */
  .etat {
    font-family:'Cinzel', serif;
    font-size:clamp(10px,2.8vw,13px);
    letter-spacing:5px;
    text-transform:uppercase;
    animation:fadein 4s ease;
  }
  .etat.favorable { color:#22c55e; text-shadow:0 0 20px rgba(34,197,94,.4); }
  .etat.neutre    { color:#d4b896; opacity:.7; }
  .etat.prudence  { color:#f59e0b; text-shadow:0 0 20px rgba(245,158,11,.4); }

  /* TIMESTAMP */
  .timestamp {
    position:fixed;
    bottom:28px;
    left:50%;
    transform:translateX(-50%);
    font-family:'Cormorant Garamond', serif;
    font-size:clamp(11px,2.5vw,13px);
    color:rgba(212,184,150,.3);
    letter-spacing:2px;
    white-space:nowrap;
    animation:fadein 5s ease;
  }

  @keyframes fadein {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="content">
  <div class="signe-label">Séragone · Signe du jour</div>
  <div class="pct" id="pct">73<span style="font-size:45%;color:rgba(240,192,64,.7);vertical-align:super;">%</span></div>
  <div class="libelle" id="libelle">Pluie d'or</div>
  <div class="sep"></div>
  <div class="etat favorable" id="etat">Favorable</div>
</div>

<div class="timestamp" id="ts"></div>

<script>
// ── Timestamp ──
function majTS() {
  const now = new Date();
  document.getElementById('ts').textContent =
    now.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'})
    + ' · '
    + now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
}
majTS();
setInterval(majTS, 60000);

// ── Données depuis state.json (ou collecteur OVH) ──
async function fetchSigne() {
  try {
    // Adapter l'URL si besoin
    const res = await fetch('https://vps-1e58449b.vps.ovh.net/data');
    const d   = await res.json();

    // Champ prioritaire : chance_gain_pct ou pluie_or_pct ou convergence_pct
    const val = d.chance_gain_pct ?? d.pluie_or_pct ?? d.convergence_pct ?? d.convergence ?? 73;
    const pct = parseFloat(val).toFixed(1);

    document.getElementById('pct').innerHTML =
      pct + '<span style="font-size:45%;color:rgba(240,192,64,.7);vertical-align:super;">%</span>';

    // Libellé selon la valeur
    const libelle = pct >= 70 ? 'Pluie d'or'
                  : pct >= 40 ? 'Veille dorée'
                  :             'Silence des mondes';
    document.getElementById('libelle').textContent = libelle;

    // État selon la valeur
    const etatEl = document.getElementById('etat');
    etatEl.className = 'etat';
    if (pct >= 60) {
      etatEl.textContent = 'Favorable';
      etatEl.classList.add('favorable');
    } else if (pct >= 30) {
      etatEl.textContent = 'Neutre';
      etatEl.classList.add('neutre');
    } else {
      etatEl.textContent = 'Prudence';
      etatEl.classList.add('prudence');
    }

  } catch(e) {
    // Pas de connexion — valeurs de démonstration
    console.log('Mode démo');
  }
}

fetchSigne();
setInterval(fetchSigne, 30000);
</script>

</body>
